<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chatiemos · Timón</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #F9F8F6;
      --bot-bubble:  #FFFFFF;
      --user-bubble: #EDE8DF;
      --text:        #2D2D2D;
      --text-soft:   #9A9590;
      --border:      #E8E3DC;
      --shadow:      0 1px 6px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .chat-wrapper   { display: flex; justify-content: center; height: 100%; }
    .chat-container { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; }

    /* ── Header ── */
    .chat-header {
      padding: 18px 20px 14px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .bot-avatar {
      width: 38px; height: 38px; background: var(--text); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .header-info p  { font-size: 12px; color: var(--text-soft); margin-top: 1px; }
    .online-dot {
      width: 7px; height: 7px; background: #6BCB77;
      border-radius: 50%; display: inline-block; margin-right: 3px;
    }

    /* ── Progress ── */
    .progress-track { height: 2px; background: var(--border); flex-shrink: 0; }
    .progress-fill  { height: 100%; background: var(--text); width: 0%; transition: width 0.35s cubic-bezier(0.4,0,0.2,1); }

    /* ── Messages ── */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 22px 16px 12px;
      display: flex; flex-direction: column; gap: 8px;
      scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 3px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Bubbles ── */
    .msg {
      display: flex; max-width: 82%;
      animation: popIn 0.22s ease-out forwards;
      opacity: 0;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .bubble {
      padding: 11px 15px; font-size: 15px;
      line-height: 1.6; border-radius: 20px;
    }
    .msg.bot .bubble  { background: var(--bot-bubble); box-shadow: var(--shadow); border-top-left-radius: 5px; }
    .msg.user .bubble { background: var(--user-bubble); border-top-right-radius: 5px; }

    /* ── Section divider ── */
    .section-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 8px 0;
      animation: popIn 0.25s ease forwards; opacity: 0;
    }
    .section-divider span {
      font-size: 11px; font-weight: 600; color: var(--text-soft);
      letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap;
    }
    .section-divider::before,
    .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Typing indicator ── */
    .typing-wrap { align-self: flex-start; animation: popIn 0.2s ease forwards; opacity: 0; }
    .typing-bubble {
      background: var(--bot-bubble); box-shadow: var(--shadow);
      border-radius: 20px; border-top-left-radius: 5px;
      padding: 12px 16px; display: flex; align-items: center; gap: 5px;
    }
    .dot { width: 6px; height: 6px; background: #C8C2BB; border-radius: 50%; animation: bounce 1.1s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-3px); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 16px max(14px, env(safe-area-inset-bottom));
      background: var(--bg); border-top: 1px solid var(--border);
      flex-shrink: 0; min-height: 74px;
      display: flex; align-items: center;
    }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
    .qr-btn {
      padding: 10px 20px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 999px; font-size: 14px; font-family: inherit;
      font-weight: 500; color: var(--text); cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }
    .qr-btn:hover  { background: var(--text); color: var(--bg); border-color: var(--text); }
    .qr-btn:active { transform: scale(0.96); }

    .text-form { display: flex; align-items: flex-end; gap: 10px; width: 100%; }
    .text-input {
      flex: 1; padding: 12px 16px;
      background: #FFFFFF; border: 1.5px solid var(--border);
      border-radius: 24px; font-size: 15px; font-family: inherit;
      color: var(--text); outline: none; resize: none; overflow-y: hidden;
      line-height: 1.5; min-height: 46px; max-height: 112px;
      transition: border-color 0.2s;
    }
    .text-input::placeholder { color: #B8B2AB; }
    .text-input:focus { border-color: #AAA49D; }

    .char-count {
      font-size: 11px;
      font-weight: 500;
      color: #B8B2AB;
      padding: 0 4px;
      transition: color 0.15s;
    }

    .send-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: var(--text); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }
    .send-btn:hover  { background: #444; }
    .send-btn:active { transform: scale(0.94); }

    .end-state { width: 100%; text-align: center; font-size: 13px; color: var(--text-soft); }

    /* ── Header: back link (solo web) ── */
    .header-back { display: none; }

    /* ── Tablet / Desktop (≥ 640px) ── */
    @media (min-width: 640px) {
      html, body {
        height: auto;
        min-height: 100svh;
        background: #DDD9D1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
      }

      .chat-wrapper {
        width: 100%;
        max-width: 720px;
        height: min(720px, calc(100svh - 80px));
        border-radius: 24px;
        box-shadow: 0 12px 56px rgba(0,0,0,0.16), 0 0 0 1px rgba(0,0,0,0.05);
        overflow: hidden;
      }

      .chat-container {
        max-width: 100%;
        height: 100%;
      }

      .chat-header {
        padding: 20px 28px 16px;
      }

      .header-back {
        display: block;
        margin-left: auto;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-soft);
        text-decoration: none;
        transition: color 0.15s;
      }

      .header-back:hover { color: var(--text); }

      .messages-area {
        padding: 24px 28px 12px;
      }

      .input-area {
        padding: 14px 28px 20px;
      }

      .bubble {
        font-size: 15px;
      }
    }

    /* ── Desktop (≥ 1024px) ── */
    @media (min-width: 1024px) {
      .chat-wrapper {
        max-width: 800px;
        height: min(760px, calc(100svh - 80px));
      }

      .chat-header {
        padding: 22px 36px 18px;
      }

      .messages-area {
        padding: 28px 36px 12px;
      }

      .input-area {
        padding: 16px 36px 24px;
      }

      .bubble {
        font-size: 16px;
        padding: 12px 18px;
      }

      .msg { max-width: 75%; }
    }
  </style>
</head>

  { text: 'Siempre me gustó…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'En mi casa…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Para trabajar es importante…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Elegir…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'A veces me da miedo…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Lo que más me atrae de un trabajo es…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'En la vida quiero llegar a ser…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Ir a la universidad hoy…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Las personas que estudian…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Siento que los demás esperan que yo…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Cuando se me acerca una figura de autoridad, yo…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },
  { text: 'Una profesión me daría la posibilidad de…', inputType: 'text', placeholder: 'Completá la frase...', delay: 900 },

  { text: 'Imaginá que pasaron 10 años y sentís que estás bien con tu vida. ¿Cómo es un día de esa vida?', inputType: 'text', placeholder: 'Describí ese día con detalle...', delay: 1100 },
  { text: 'Si hoy pudieras elegir sin miedo ni presión externa, ¿hacia dónde irías?', inputType: 'text', placeholder: 'Respondé con honestidad...', delay: 1000 },
  { text: '¿Qué es lo que más te frena hoy para avanzar hacia lo que querés?', inputType: 'text', placeholder: 'Sin filtros...', delay: 1000 },
  { text: 'Seamos honestos: ¿qué tan difícil te resulta sentarte y ponerte a estudiar? ¿Cuántas horas seguidas podés hacerlo? Cuando decís que lo vas a hacer, ¿lo terminás haciendo o lo pateas para más adelante?', inputType: 'text', placeholder: 'Con total sinceridad...', delay: 1300 },
  { text: 'Modelos: ¿A qué personas te quisieras parecer? ¿Por qué?', inputType: 'text', placeholder: 'Personas reales o de la historia...', delay: 1000 },
  { text: 'Cuando eras chico/a, ¿qué querías ser de grande?', inputType: 'text', placeholder: 'Lo primero que se te venga...', delay: 1000 },

  { text: 'Eso es todo.', inputType: 'none', delay: 900 },
  { text: 'Todo lo que compartiste queda guardado. Gracias por la sinceridad — eso es lo más valioso. 🎯', inputType: 'end', delay: 1500 },
];

const activeFlow = parte === 1 ? flow_part1 : flow_part2;

// ═══════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════
let currentSection = 0;
const responses    = [];
const totalAnswerable = activeFlow.filter(s =>
  (s.inputType === 'options' || s.inputType === 'text') && !s.isIcebreaker
).length;
let answered = 0;
let answersSinceAck = 0;

// ═══════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════
const messagesArea = document.getElementById('messagesArea');
const inputArea    = document.getElementById('inputArea');
const progressFill = document.getElementById('progressFill');

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function scrollBottom() {
  requestAnimationFrame(() => { messagesArea.scrollTop = messagesArea.scrollHeight; });
}

function updateProgress() {
  progressFill.style.width = ((answered / totalAnswerable) * 100) + '%';
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing-wrap';
  el.id = 'typing';
  el.innerHTML = `<div class="typing-bubble">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>`;
  messagesArea.appendChild(el);
  scrollBottom();
}

function hideTyping() { document.getElementById('typing')?.remove(); }

function appendBotMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `<div class="bubble">${text}</div>`;
  messagesArea.appendChild(el);
  scrollBottom();
}

function appendUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  messagesArea.appendChild(el);
  scrollBottom();
}

function appendDivider(label) {
  const el = document.createElement('div');
  el.className = 'section-divider';
  el.innerHTML = `<span>${label}</span>`;
  messagesArea.appendChild(el);
  scrollBottom();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearInput() { inputArea.innerHTML = ''; }

// ═══════════════════════════════════════════════════════════
// SISTEMA DE ACKNOWLEDGMENTS
// ═══════════════════════════════════════════════════════════
function showAckThenAdvance(ackText, nextIdx) {
  showTyping();
  setTimeout(() => {
    hideTyping();
    appendBotMsg(ackText);
    setTimeout(() => processStep(nextIdx), 500);
  }, 700);
}

// ═══════════════════════════════════════════════════════════
// INPUT RENDERERS
// ═══════════════════════════════════════════════════════════
function renderOptions(options, onAnswer) {
  clearInput();
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('button').forEach(b => b.disabled = true);
      onAnswer(opt);
    });
    wrap.appendChild(btn);
  });
  inputArea.appendChild(wrap);
}

function renderTextInput(placeholder, onAnswer) {
  clearInput();

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;flex-direction:column;gap:6px;width:100%;';

  const row = document.createElement('div');
  row.className = 'text-form';

  const ta = document.createElement('textarea');
  ta.className = 'text-input';
  ta.placeholder = placeholder || 'Escribí lo que se te venga a la mente...';
  ta.rows = 1;

  const btn = document.createElement('button');
  btn.className = 'send-btn';
  btn.type = 'button';
  btn.disabled = true;
  btn.style.opacity = '0.4';
  btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"
      stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  const charCount = document.createElement('span');
  charCount.className = 'char-count';
  charCount.textContent = '0 / 50';

  function submit() {
    const val = ta.value.trim();
    if (val.length < 50) return;
    ta.disabled = true;
    btn.disabled = true;
    onAnswer(val);
  }

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 112) + 'px';
    const len = ta.value.trim().length;
    if (len >= 50) {
      charCount.textContent = len + ' ✓';
      charCount.style.color = '#6BCB77';
      btn.disabled = false;
      btn.style.opacity = '1';
    } else {
      charCount.textContent = len + ' / 50';
      charCount.style.color = '#B8B2AB';
      btn.disabled = true;
      btn.style.opacity = '0.4';
    }
  });

  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  btn.addEventListener('click', submit);

  row.appendChild(ta);
  row.appendChild(btn);
  wrapper.appendChild(row);
  wrapper.appendChild(charCount);
  inputArea.appendChild(wrapper);
  setTimeout(() => ta.focus(), 80);
}

function renderEnd() {
  if (parte === 1) {
    localStorage.setItem('orientacion_parte1_data', JSON.stringify(responses));
    localStorage.setItem('orientacion_parte1_done', 'done');
  } else {
    localStorage.setItem('orientacion_data', JSON.stringify(responses));
    localStorage.setItem('orientacion_done', 'done');
  }
  clearInput();
  const el = document.createElement('div');
  el.className = 'end-state';
  el.textContent = parte === 1 ? '✓ Parte 1 completada' : '✓ Respuestas guardadas';
  inputArea.appendChild(el);
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
}

// ═══════════════════════════════════════════════════════════
// MOTOR DEL FLUJO
// ═══════════════════════════════════════════════════════════
function saveAndAdvance(idx, question, value) {
  const step = activeFlow[idx];
  const isIcebreaker = !!step.isIcebreaker;

  if (!isIcebreaker) {
    responses.push({ question, answer: value });
    answered++;
    answersSinceAck++;
    updateProgress();
  }

  appendUserMsg(value);

  if (isIcebreaker) {
    showAckThenAdvance(step.ackText || 'Bien.', idx + 1);
  } else if (step.customAck && step.customAck[value]) {
    showAckThenAdvance(step.customAck[value], idx + 1);
  } else if (answersSinceAck > 0 && answersSinceAck % 5 === 0) {
    showAckThenAdvance(pickAck(), idx + 1);
  } else {
    setTimeout(() => processStep(idx + 1), 480);
  }
}

function processStep(idx) {
  if (idx >= activeFlow.length) return;
  const step = activeFlow[idx];
  clearInput();

  if (step.isDivider) {
    if (step.sectionNum !== undefined) currentSection = step.sectionNum;
    setTimeout(() => {
      appendDivider(step.label);
      setTimeout(() => processStep(idx + 1), 420);
    }, step.delay || 300);
    return;
  }

  showTyping();

  setTimeout(() => {
    hideTyping();
    appendBotMsg(step.text);

    if (step.inputType === 'none') {
      setTimeout(() => processStep(idx + 1), 520);
    } else if (step.inputType === 'options') {
      renderOptions(step.options, value => saveAndAdvance(idx, step.text, value));
    } else if (step.inputType === 'text') {
      renderTextInput(step.placeholder, value => saveAndAdvance(idx, step.text, value));
    } else if (step.inputType === 'end') {
      renderEnd();
    }
  }, step.delay);
}

// ── Actualizar subtítulo del header con número de parte
(function() {
  const sub = document.querySelector('.header-info p');
  if (sub) sub.innerHTML = '<span class="online-dot"></span>Parte ' + parte + ' / 2';
})();

// ── ARRANQUE
processStep(0);
</script>
</body>
