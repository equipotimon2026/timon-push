<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Perspectiva Familiar · Timón</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #F9F8F6;
      --bot-bubble:  #FFFFFF;
      --user-bubble: #EDE8DF;
      --text:        #2D2D2D;
      --text-soft:   #9A9590;
      --border:      #E8E3DC;
      --shadow:      0 1px 6px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
      --accent:      #D97706;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .chat-wrapper   { display: flex; justify-content: center; height: 100%; }
    .chat-container { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; }

    /* ── Header ── */
    .chat-header {
      padding: 18px 20px 14px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .bot-avatar {
      width: 38px; height: 38px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .header-info p  { font-size: 12px; color: var(--text-soft); margin-top: 1px; }
    .online-dot {
      width: 7px; height: 7px; background: #6BCB77;
      border-radius: 50%; display: inline-block; margin-right: 3px;
    }

    /* ── Banner ── */
    .family-banner {
      background: #FFFBEB;
      border-bottom: 1px solid #FDE68A;
      padding: 10px 20px;
      display: flex; align-items: flex-start; gap: 10px;
      flex-shrink: 0;
    }
    .family-banner-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .family-banner-text {
      font-size: 12px; color: #92400E; line-height: 1.5;
    }
    .family-banner-text strong { font-weight: 600; }

    /* ── Progress ── */
    .progress-track { height: 2px; background: var(--border); flex-shrink: 0; }
    .progress-fill  { height: 100%; background: var(--accent); width: 0%; transition: width 0.35s cubic-bezier(0.4,0,0.2,1); }

    /* ── Messages ── */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 22px 16px 12px;
      display: flex; flex-direction: column; gap: 8px;
      scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 3px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Bubbles ── */
    .msg {
      display: flex; max-width: 82%;
      animation: popIn 0.22s ease-out forwards;
      opacity: 0;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .bubble {
      padding: 11px 15px; font-size: 15px;
      line-height: 1.6; border-radius: 20px;
    }
    .msg.bot .bubble  { background: var(--bot-bubble); box-shadow: var(--shadow); border-top-left-radius: 5px; }
    .msg.user .bubble { background: var(--user-bubble); border-top-right-radius: 5px; }

    /* ── Section divider ── */
    .section-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 8px 0;
      animation: popIn 0.25s ease forwards; opacity: 0;
    }
    .section-divider span {
      font-size: 11px; font-weight: 600; color: var(--text-soft);
      letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap;
    }
    .section-divider::before,
    .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Typing indicator ── */
    .typing-wrap { align-self: flex-start; animation: popIn 0.2s ease forwards; opacity: 0; }
    .typing-bubble {
      background: var(--bot-bubble); box-shadow: var(--shadow);
      border-radius: 20px; border-top-left-radius: 5px;
      padding: 12px 16px; display: flex; align-items: center; gap: 5px;
    }
    .dot { width: 6px; height: 6px; background: #C8C2BB; border-radius: 50%; animation: bounce 1.1s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-3px); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 16px max(14px, env(safe-area-inset-bottom));
      background: var(--bg); border-top: 1px solid var(--border);
      flex-shrink: 0; min-height: 74px;
      display: flex; align-items: center;
    }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
    .qr-btn {
      padding: 10px 20px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 999px; font-size: 14px; font-family: inherit;
      font-weight: 500; color: var(--text); cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }
    .qr-btn:hover  { background: var(--text); color: var(--bg); border-color: var(--text); }
    .qr-btn:active { transform: scale(0.96); }

    .text-form { display: flex; align-items: flex-end; gap: 10px; width: 100%; }
    .text-input {
      flex: 1; padding: 12px 16px;
      background: #FFFFFF; border: 1.5px solid var(--border);
      border-radius: 24px; font-size: 15px; font-family: inherit;
      color: var(--text); outline: none; resize: none; overflow-y: hidden;
      line-height: 1.5; min-height: 46px; max-height: 112px;
      transition: border-color 0.2s;
    }
    .text-input::placeholder { color: #B8B2AB; }
    .text-input:focus { border-color: #AAA49D; }

    .char-count {
      font-size: 11px; font-weight: 500;
      color: #B8B2AB; padding: 0 4px;
      transition: color 0.15s;
    }

    .send-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: var(--text); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }
    .send-btn:hover  { background: #444; }
    .send-btn:active { transform: scale(0.94); }

    .end-state { width: 100%; text-align: center; font-size: 13px; color: var(--text-soft); }

    .header-back { display: none; }

    /* ── Tablet / Desktop (≥ 640px) ── */
    @media (min-width: 640px) {
      html, body {
        height: auto; min-height: 100svh;
        background: #DDD9D1;
        display: flex; align-items: center; justify-content: center;
        padding: 40px 24px;
      }
      .chat-wrapper {
        width: 100%; max-width: 720px;
        height: min(760px, calc(100svh - 80px));
        border-radius: 24px;
        box-shadow: 0 12px 56px rgba(0,0,0,0.16), 0 0 0 1px rgba(0,0,0,0.05);
        overflow: hidden;
      }
      .chat-container { max-width: 100%; height: 100%; }
      .chat-header { padding: 20px 28px 16px; }
      .family-banner { padding: 10px 28px; }
      .header-back {
        display: block; margin-left: auto;
        font-size: 13px; font-weight: 500;
        color: var(--text-soft); text-decoration: none;
        transition: color 0.15s;
      }
      .header-back:hover { color: var(--text); }
      .messages-area { padding: 24px 28px 12px; }
      .input-area { padding: 14px 28px 20px; }
    }

    /* ── Desktop (≥ 1024px) ── */
    @media (min-width: 1024px) {
      .chat-wrapper {
        max-width: 800px;
        height: min(800px, calc(100svh - 80px));
      }
      .chat-header { padding: 22px 36px 18px; }
      .family-banner { padding: 10px 36px; }
      .messages-area { padding: 28px 36px 12px; }
      .input-area { padding: 16px 36px 24px; }
      .bubble { font-size: 16px; padding: 12px 18px; }
      .msg { max-width: 75%; }
    }
  </style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-container">

    <div class="chat-header">
      <div class="bot-avatar">🏠</div>
      <div class="header-info">
        <h1>Perspectiva Familiar</h1>
        <p id="headerSub"><span class="online-dot"></span>Para padres, tutores o familiares</p>
      </div>
      <a href="dashboard.html" class="header-back">← Dashboard</a>
    </div>

    <div class="family-banner">
      <span class="family-banner-icon">⚠️</span>
      <span class="family-banner-text">
        <strong>Este módulo es para un familiar, padre, madre o tutor.</strong>
        Si sos el/la estudiante, compartí este link con alguien de confianza que te conozca bien.
      </span>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area" id="inputArea"></div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// NOMBRE DEL ESTUDIANTE
// ═══════════════════════════════════════════════════════════
let nombre = 'el/la estudiante';
try {
  const user = JSON.parse(localStorage.getItem('timon_session') || '{}');
  if (user.nombre) nombre = user.nombre.split(' ')[0];
} catch(e) {}

// ═══════════════════════════════════════════════════════════
// ACK POOL
// ═══════════════════════════════════════════════════════════
const ACK_POOL = [
  'Gracias por compartir eso.', 'Muy valioso, gracias.', 'Qué bueno saberlo.',
  'Eso nos ayuda mucho.', 'Interesante perspectiva.', 'Gracias por la honestidad.',
  'Muy importante eso.', 'Qué bueno.', 'Lo tomamos en cuenta.',
];
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickAck() { return rnd(ACK_POOL); }

// ═══════════════════════════════════════════════════════════
// FLUJO
// minChars: mínimo de caracteres para habilitar envío
// ═══════════════════════════════════════════════════════════
const flow = [
  {
    text: `Hola. Este espacio es para que vos — como padre, madre, familiar o tutor de ${nombre} — puedas compartir tu perspectiva. Tu mirada es muy importante para el proceso de orientación vocacional.`,
    inputType: 'none', delay: 1600
  },
  {
    text: '¿Arrancamos?',
    inputType: 'options', options: ['Sí, empecemos', 'Listo/a'],
    ackText: 'Perfecto. Gracias por tu tiempo.', delay: 1000
  },

  // ── SOBRE VOS ──
  { text: '— Sobre vos —', inputType: 'divider' },
  {
    text: 'Para empezar, contanos: ¿cuál es tu nombre y apellido, tu edad y tu ocupación actual?',
    inputType: 'text', placeholder: 'Nombre, edad y ocupación...', minChars: 5, delay: 900
  },
  {
    text: '¿Te sentís satisfecho/a con tu ocupación actual?',
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 800
  },
  {
    text: '¿Comenzaste y abandonaste alguna carrera en algún momento?',
    inputType: 'options', options: ['Sí', 'No'],
    nextStep: { 'Sí': 6, 'No': 7 }, delay: 800
  },
  {
    text: '¿Cuál fue esa carrera y qué pasó? Contanos un poco más.',
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 700,
    conditional: true
  },
  {
    text: '¿Te hubiese gustado realizar otra actividad o estudiar otra carrera? ¿Cuál? ¿Recordás por qué no lo hiciste?',
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 800
  },
  {
    text: '¿Cuáles son las profesiones y ocupaciones que más valorás hoy en día?',
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 800
  },
  {
    text: '¿Creés que hay carreras con mayor salida laboral actualmente? ¿Cuáles sí y cuáles menos?',
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 800
  },

  // ── SOBRE EL ESTUDIANTE ──
  { text: `— Sobre ${nombre} —`, inputType: 'divider' },
  {
    text: `¿Hay alguna ocupación o profesión particular que te gustaría ver en ${nombre}? ¿Cuál y por qué?`,
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 900
  },
  {
    text: `¿Qué habilidades o cualidades destacarías en ${nombre}? ¿Qué aspectos crees que debería trabajar en lo personal?`,
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 800
  },
  {
    text: `¿Cómo ves la posibilidad de que ${nombre} empiece a trabajar en lugar de estudiar?`,
    inputType: 'text', placeholder: 'Contanos...', minChars: 50, delay: 800
  },
  {
    text: 'Para terminar, ¿hay algo más que quieras agregar? Cualquier comentario que sientas que puede ser útil.',
    inputType: 'text', placeholder: 'Comentarios adicionales...', minChars: 50, delay: 800
  },

  {
    text: `¡Muchas gracias! Tu perspectiva es muy valiosa para el proceso de ${nombre}. 🙏`,
    inputType: 'end', delay: 1500
  },
];

// ═══════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════
const responses = [];
const answerable = flow.filter(s => s.inputType === 'text' || (s.inputType === 'options' && !s.ackText?.includes('Perfecto')));
// count steps that require an answer
const totalAnswerable = flow.filter(s => s.inputType === 'text' && !s.conditional).length;
let answeredCount = 0;

const messagesArea = document.getElementById('messagesArea');
const inputArea    = document.getElementById('inputArea');
const progressFill = document.getElementById('progressFill');

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function scrollBottom() {
  setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 60);
}

function addBotBubble(text, delay = 0) {
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'typing-wrap';
    typing.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    messagesArea.appendChild(typing);
    scrollBottom();
    setTimeout(() => {
      typing.remove();
      const msg = document.createElement('div');
      msg.className = 'msg bot';
      msg.innerHTML = `<div class="bubble">${text}</div>`;
      messagesArea.appendChild(msg);
      scrollBottom();
      resolve();
    }, delay);
  });
}

function addUserBubble(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `<div class="bubble">${text}</div>`;
  messagesArea.appendChild(msg);
  scrollBottom();
}

function addDivider(text) {
  const div = document.createElement('div');
  div.className = 'section-divider';
  div.innerHTML = `<span>${text}</span>`;
  messagesArea.appendChild(div);
  scrollBottom();
}

function updateProgress() {
  const pct = totalAnswerable > 0 ? (answeredCount / totalAnswerable) * 100 : 0;
  progressFill.style.width = pct + '%';
}

// ═══════════════════════════════════════════════════════════
// RENDER INPUT
// ═══════════════════════════════════════════════════════════
function renderOptions(options, onAnswer) {
  inputArea.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
      onAnswer(opt);
    });
    wrap.appendChild(btn);
  });
  inputArea.appendChild(wrap);
}

function renderTextInput(placeholder, minChars, onAnswer) {
  inputArea.innerHTML = '';
  const form = document.createElement('div');
  form.className = 'text-form';

  const ta = document.createElement('textarea');
  ta.className = 'text-input';
  ta.placeholder = placeholder || 'Escribí tu respuesta...';
  ta.rows = 1;

  const charCount = document.createElement('span');
  charCount.className = 'char-count';
  charCount.textContent = minChars > 5 ? `0 / ${minChars}` : '';

  const btn = document.createElement('button');
  btn.className = 'send-btn';
  btn.disabled = minChars > 5 ? true : false;
  btn.style.opacity = minChars > 5 ? '0.4' : '1';
  btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 112) + 'px';
    const len = ta.value.trim().length;
    if (minChars > 5) {
      if (len >= minChars) {
        charCount.textContent = len + ' ✓';
        charCount.style.color = '#6BCB77';
        btn.disabled = false;
        btn.style.opacity = '1';
      } else {
        charCount.textContent = len + ' / ' + minChars;
        charCount.style.color = '#B8B2AB';
        btn.disabled = true;
        btn.style.opacity = '0.4';
      }
    } else {
      btn.disabled = len < 1;
      btn.style.opacity = len >= 1 ? '1' : '0.4';
    }
  });

  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!btn.disabled) btn.click();
    }
  });

  btn.addEventListener('click', () => {
    const val = ta.value.trim();
    if (!val || (minChars > 5 && val.length < minChars)) return;
    inputArea.innerHTML = '';
    onAnswer(val);
  });

  form.appendChild(ta);
  form.appendChild(charCount);
  form.appendChild(btn);
  inputArea.appendChild(form);
  setTimeout(() => ta.focus(), 100);
}

function clearInput() {
  inputArea.innerHTML = '';
}

// ═══════════════════════════════════════════════════════════
// FLUJO PRINCIPAL
// ═══════════════════════════════════════════════════════════
async function processStep(idx) {
  if (idx >= flow.length) return;
  const step = flow[idx];

  if (step.inputType === 'divider') {
    addDivider(step.text);
    setTimeout(() => processStep(idx + 1), 300);
    return;
  }

  if (step.inputType === 'none') {
    await addBotBubble(step.text, step.delay || 900);
    setTimeout(() => processStep(idx + 1), 400);
    return;
  }

  if (step.inputType === 'end') {
    clearInput();
    await addBotBubble(step.text, step.delay || 1200);
    localStorage.setItem('padres_data', JSON.stringify(responses));
    localStorage.setItem('padres_done', 'done');
    setTimeout(() => {
      inputArea.innerHTML = '<div class="end-state">Respuestas guardadas. Podés cerrar esta pantalla. ✓</div>';
    }, 600);
    return;
  }

  if (step.inputType === 'options') {
    await addBotBubble(step.text, step.delay || 900);
    renderOptions(step.options, async answer => {
      addUserBubble(answer);
      responses.push({ q: step.text, a: answer });
      clearInput();
      if (step.ackText) {
        await addBotBubble(step.ackText, 700);
      }
      const nextIdx = (step.nextStep && step.nextStep[answer] !== undefined)
        ? step.nextStep[answer]
        : idx + 1;
      processStep(nextIdx);
    });
    return;
  }

  if (step.inputType === 'text') {
    await addBotBubble(step.text, step.delay || 900);
    renderTextInput(step.placeholder, step.minChars || 50, async answer => {
      addUserBubble(answer);
      responses.push({ q: step.text, a: answer });
      answeredCount++;
      updateProgress();
      clearInput();
      const ack = await addBotBubble(pickAck(), 700);
      processStep(idx + 1);
    });
    return;
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(function() {
  if (localStorage.getItem('padres_done') === 'done') {
    inputArea.innerHTML = '<div class="end-state">Este módulo ya fue completado. ✓</div>';
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.style.opacity = '1';
    msg.innerHTML = `<div class="bubble">¡Gracias! Las respuestas ya fueron registradas. 🙏</div>`;
    messagesArea.appendChild(msg);
    return;
  }
  processStep(0);
})();
</script>
</body>
</html>
